name: defenseprophet-infer
channels:
  - bioconda
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - libgcc-ng>=15
  - libstdcxx-ng>=15
  - prodigal
  - numpy=2.3.5
  - pandas=3.0.0
  - tqdm=4.67.1
  - safetensors=0.7.0
  - tokenizers=0.22.2
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.6.0+cu124
      - transformers==5.0.0
